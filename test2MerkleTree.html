<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="./ethers-5.7.2.umd.min.js" type="application/javascript"></script>
    <script src="./js/crypto-js.min.js" type="application/javascript"></script>
    <title>区块链 Merkle Tree 教学总结版</title>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --primary-blue: #3b82f6;
            --danger-red: #ef4444;
            --accent-gold: #d97706;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; overflow: hidden; }
        .container { display: flex; flex: 1; gap: 20px; overflow: hidden; position: relative; }
        
        #left-panel { width: 280px; background: var(--panel-bg); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); overflow-y: auto; }
        #right-panel { flex: 1; background: var(--panel-bg); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); display: flex; flex-direction: column; position: relative; }
        
        h2 { color: var(--text-main); font-size: 1.1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 15px; text-align: center; }
        .input-group { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        input { width: 100px; border: 2px solid #cbd5e1; color: var(--primary-blue); padding: 4px 8px; border-radius: 6px; font-weight: 800; outline: none; }
        input:focus { border-color: var(--primary-blue); }

        /* 可视化区域 */
        #tree-area { flex: 2; position: relative; display: flex; flex-direction: column-reverse; align-items: center; justify-content: space-around; padding: 20px 0; border-bottom: 1px dashed #e2e8f0; }
        .tree-layer { display: flex; justify-content: center; width: 100%; gap: 10px; z-index: 5; }
        .node { width: 50px; height: 28px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; font-family: monospace; font-size: 9px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .node.root { border-color: var(--accent-gold); width: 90px; height: 36px; font-size: 12px; font-weight: bold; background: #fffbeb; }
        .changed { background: #fee2e2 !important; border-color: var(--danger-red) !important; color: var(--danger-red) !important; font-weight: bold; transform: scale(1.05); }

        /* 学习要点文本区 */
        #learning-points { flex: 1; padding: 15px; background: #f1f5f9; border-radius: 8px; margin-top: 15px; overflow-y: auto; font-size: 0.95rem; line-height: 1.6; }
        .point-title { font-weight: 800; color: #0f172a; border-left: 4px solid var(--primary-blue); padding-left: 10px; margin-bottom: 10px; display: block; }
        .highlight { color: var(--danger-red); font-weight: bold; }
        
        #svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="left-panel">
            <h2>📊 业务账本 L2</h2>
            <div id="input-list"></div>
        </div>

        <div id="right-panel">
            <div id="tree-area">
                <svg id="svg-canvas"></svg>
                </div>

            <div id="learning-points">
                <span class="point-title">📚 学习要点巩固</span>
                <p>1. 底层叶子的哈希值变了，导致所有上层父节点的哈希值全部断裂，最终算出来的 <span class="highlight">StateRoot</span> 会变得面目全非。以太坊区块不产出余额，只记录“变动指令”。真正的余额表像是一座巨大的图书馆，存在于每一个节点的本地仓库里。而区块头里的 <code>StateRoot</code> 就是这座图书馆的<span class="highlight">全量索引指纹</span>。只要索引指纹对得上，就不担心图书馆里的书被偷偷换掉。</p>
                <p>2. <span class="highlight">Merkle Tree</span> 是区块链“四两拨千斤”的核心：它解释了为什么 <span class="highlight">32 字节的哈希值（区块头）</span> 能够锁定 3.81 亿个钱包（唯一地址数）几百 GB 的全球余额。</p>
            </div>
        </div>
    </div>

    <script>
        let users = Array.from({length: 16}, (_, i) => ({ id: String.fromCharCode(65 + i), balance: 100 }));
        let initialHashes = [];

        function getHash(text) { return CryptoJS.SHA256(text).toString().substring(0, 6); }

        function updateValue(index, newVal) {
            users[index].balance = newVal;
            render();
        }

        function render() {
            const inputList = document.getElementById('input-list');
            if (!inputList.innerHTML) {
                inputList.innerHTML = users.map((u, i) => `
                    <div class="input-group">
                        <label>User ${u.id}</label>
                        <input type="number" value="${u.balance}" oninput="updateValue(${i}, this.value)">
                    </div>`).join('');
            }

            let layers = [];
            let current = users.map(u => getHash(u.id + u.balance));
            layers.push(current);
            for (let i = 0; i < 4; i++) {
                let next = [];
                for (let j = 0; j < current.length; j += 2) {
                    next.push(getHash(current[j] + current[j+1]));
                }
                current = next;
                layers.push(current);
            }

            if (initialHashes.length === 0) initialHashes = layers.map(l => [...l]);

            const area = document.getElementById('tree-area');
            // 清理旧节点，保留SVG
            const oldNodes = area.querySelectorAll('.tree-layer');
            oldNodes.forEach(n => n.remove());

            layers.forEach((layer, lIdx) => {
                const layerDiv = document.createElement('div');
                layerDiv.className = "tree-layer";
                layerDiv.id = `layer-${lIdx}`;
                layerDiv.innerHTML = layer.map((h, nIdx) => {
                    const isChanged = h !== initialHashes[lIdx][nIdx];
                    return `<div class="node ${lIdx === 4?'root':''} ${isChanged?'changed':''}" id="node-${lIdx}-${nIdx}">${h}</div>`;
                }).join('');
                area.appendChild(layerDiv);
            });

            setTimeout(drawLines, 50);
        }

        function drawLines() {
            const svg = document.getElementById('svg-canvas');
            svg.innerHTML = '';
            const area = document.getElementById('tree-area');
            const rect = area.getBoundingClientRect();

            for (let l = 0; l < 4; l++) {
                for (let n = 0; n < Math.pow(2, 4-l); n++) {
                    const child = document.getElementById(`node-${l}-${n}`);
                    const parent = document.getElementById(`node-${l+1}-${Math.floor(n/2)}`);
                    if (!child || !parent) continue;

                    const cR = child.getBoundingClientRect();
                    const pR = parent.getBoundingClientRect();

                    const x1 = cR.left + cR.width/2 - rect.left;
                    const y1 = cR.top - rect.top;
                    const x2 = pR.left + pR.width/2 - rect.left;
                    const y2 = pR.bottom - rect.top;

                    const isPathChanged = child.classList.contains('changed') && parent.classList.contains('changed');
                    
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                    line.setAttribute("stroke", isPathChanged ? "#ef4444" : "#e2e8f0");
                    line.setAttribute("stroke-width", isPathChanged ? "3" : "1.5");
                    svg.appendChild(line);
                }
            }
        }

        window.onresize = drawLines;
        render();
    </script>
</body>
</html>
