<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链金融虚拟仿真实验室 - 暨南大学</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏样式 */
        .sidebar { width: 320px; background: var(--primary); color: white; padding: 25px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
        .sidebar h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; font-size: 1.2rem; }
        .data-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .data-value { font-size: 2rem; font-weight: bold; color: #f1c40f; }
        .study-notes { font-size: 0.9rem; line-height: 1.6; color: #ecf0f1; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .study-notes h3 { color: var(--accent); margin-top: 0; font-size: 1rem; }

        /* 主界面样式 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section h2 { margin-top: 0; color: var(--primary); border-left: 5px solid var(--accent); padding-left: 15px; font-size: 1.2rem; }
        
        /* 输入框布局 */
        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .input-group label { width: 100px; font-weight: bold; color: var(--secondary); font-size: 0.9rem; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; font-size: 0.85rem; }
        
        /* 按钮样式 */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: var(--success); color: white; margin-right: 10px; }
        .btn-view { background: #eee; color: #666; padding: 8px 12px; font-size: 1.1rem; }
        .btn-view:hover { background: #ddd; color: var(--primary); }

        /* 终端样式 */
        #console { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; height: 250px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; }
        .log-info { color: #9cdcfe; }
        .log-success { color: #b5cea8; }
        .log-error { color: #f44747; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📊 宏观经济数据</h2>
        <div class="data-card">
            <div>全班总产出 (GCP)</div>
            <div id="display-gcp" class="data-value">0</div>
        </div>
        <div class="data-card">
            <div>JCP 总供应量</div>
            <div id="display-supply" class="data-value">0</div>
        </div>

        <div class="study-notes">
            <h3>核心学习要点</h3>
            <p><b>1. 不完全契约 (GHM理论)：</b> 观察在信息不对称下，如何通过区块链智能合约将“事后激励”转化为“事前约束”。</p>
            <p><b>2. 治理结构：</b> 实验中 WorkLog 合约模拟了过程监管，探讨从行政规制向代码化权力制衡的转变。</p>
            <p><b>3. 代币激励：</b> JCP 补贴代表了分布式金融中的流动性激励（Mining），思考其对参与者生产行为的影响。</p>
        </div>
    </div>

    <div class="main-content">
        <div class="section">
            <h2>🔗 1. 实验室合约部署</h2>
            <div class="input-group">
                <label>生产合约</label>
                <input type="text" id="addr-work" value="0x6226c48798d6992376ad837f43b674586ed5f2e2">
                <button class="btn btn-view" title="在浏览器查看" onclick="viewOnEtherscan('addr-work')">🔍</button>
            </div>
            <div class="input-group">
                <label>JCP 合约</label>
                <input type="text" id="addr-jcp" value="0x45e2330787b318d3c498010e8f2a31d93f8f4ea5">
                <button class="btn btn-view" title="在浏览器查看" onclick="viewOnEtherscan('addr-jcp')">🔍</button>
            </div>
            <button class="btn btn-primary" onclick="initLab()">初始化实验连接</button>
        </div>

        <div class="section">
            <h2>🛠️ 2. 学生交互区</h2>
            <button class="btn btn-success" onclick="doWork()">提交生产任务 (Work)</button>
            <button class="btn btn-success" style="background:#e67e22" onclick="claimJCP()">领取 JCP 补贴</button>
            <p id="status-tag" style="font-size: 0.8rem; color: #7f8c8d; margin-top: 15px;">⚪ 等待连接区块链实验室...</p>
        </div>

        <div class="section">
            <h2>🖥️ 技术诊断终端 (Debug)</h2>
            <div id="console">> 准备就绪...</div>
        </div>
    </div>

    <script>
        let provider, signer, workContract, jcpContract;
        const workABI = ["function totalWork() public view returns (uint256)", "function performWork() public"];
        const jcpABI = ["function totalSupply() public view returns (uint256)", "function mintSubsidy() public"];

        function log(msg, type = 'info') {
            const div = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div class="log-${type}">[${time}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        function viewOnEtherscan(id) {
            const addr = document.getElementById(id).value;
            if(addr) window.open(`https://sepolia.etherscan.io/address/${addr}`, '_blank');
        }

        async function initLab() {
            try {
                if (!window.ethereum) return log("未检测到 MetaMask", "error");
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                
                const addrWork = document.getElementById('addr-work').value;
                const addrJCP = document.getElementById('addr-jcp').value;
                
                workContract = new ethers.Contract(addrWork, workABI, signer);
                jcpContract = new ethers.Contract(addrJCP, jcpABI, signer);
                
                document.getElementById('status-tag').innerText = "✅ 已连接至区块链实验室";
                log("链路打通！当前网络：" + (await provider.getNetwork()).name, "success");
                refreshData();
            } catch (e) { log("连接失败: " + e.message, "error"); }
        }

        async function refreshData() {
            try {
                const gcp = await workContract.totalWork();
                const supply = await jcpContract.totalSupply();
                document.getElementById('display-gcp').innerText = gcp.toString();
                document.getElementById('display-supply').innerText = ethers.utils.formatEther(supply).split('.')[0];
            } catch (e) { console.error(e); }
        }

        async function doWork() {
            try {
                log("正在提交生产任务...");
                const tx = await workContract.performWork();
                await tx.wait();
                log("生产任务确认成功！", "success");
                refreshData();
            } catch (e) { log("任务失败: " + e.message, "error"); }
        }

        async function claimJCP() {
            try {
                log("正在领取补贴...");
                const tx = await jcpContract.mintSubsidy();
                await tx.wait();
                log("JCP 领取成功！", "success");
                refreshData();
            } catch (e) { log("领取失败: " + e.message, "error"); }
        }
    </script>
</body>
</html>
