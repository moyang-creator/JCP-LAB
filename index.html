<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCP 终端 - 实验专用版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e06c75; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
        .main-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar { width: 350px; background: var(--primary); color: white; padding: 20px; display: flex; flex-direction: column; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .debug-console { background: #1a1c1f; color: #98c379; padding: 15px; border-radius: 5px; font-family: monospace; height: 200px; overflow-y: auto; font-size: 13px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }
        button:disabled { background: #ccc; }
        .data-box { background: #34495e; padding: 15px; border-radius: 6px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="card">
        <h3>🔗 1. 实验室合约部署</h3>
        <input type="text" id="input-worklog" placeholder="WorkLog 合约地址 (0x...)" value="">
        <input type="text" id="input-jcptoken" placeholder="JCPToken 合约地址 (0x...)" value="">
        <button onclick="connectContracts()">初始化实验连接</button>
    </div>

    <div class="card">
        <h3>🛠️ 2. 学生交互区</h3>
        <button id="btn-work" disabled onclick="doWork()" style="background:var(--primary)">提交生产任务 (Work)</button>
        <button id="btn-claim" disabled onclick="claim()" style="background:var(--success)">领取 JCP 补贴</button>
        <p id="user-status" style="color:var(--accent); font-size: 14px; margin-top: 10px;">状态：请先点击初始化</p>
    </div>

    <div class="card" style="flex:1">
        <h3>📟 技术诊断终端 (Debug)</h3>
        <div id="debug-console" class="debug-console">> 准备就绪...</div>
    </div>
</div>

<div class="sidebar">
    <h3>📊 宏观经济数据</h3>
    <div class="data-box">
        <div style="font-size: 12px; color: #bdc3c7;">全班总产出 (GCP)</div>
        <div id="val-gcp" style="font-size: 24px;">0</div>
    </div>
    <div class="data-box">
        <div style="font-size: 12px; color: #bdc3c7;">JCP 总供应量</div>
        <div id="val-supply" style="font-size: 24px;">0</div>
    </div>
</div>

<script>
    let provider, signer, workLogContract, jcpTokenContract;

    function debugLog(msg, isError = false) {
        const consoleBox = document.getElementById('debug-console');
        const color = isError ? "#e06c75" : "#98c379";
        consoleBox.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${isError ? '❌' : '⚙️'} ${msg}</div>`;
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    // 检查 ethers 是否加载成功
    window.onload = function() {
        if (typeof ethers === 'undefined') {
            debugLog("致命错误：ethers.js 库未能从互联网加载！请检查网络或更换 CDN 链接。", true);
        } else {
            debugLog("ethers.js 库加载成功，版本：" + ethers.version);
        }
    };

    async function connectContracts() {
        if (typeof ethers === 'undefined') {
            alert("脚本库未加载，请刷新页面或检查网络环境。");
            return;
        }

        const wAddr = document.getElementById('input-worklog').value.trim();
        const jAddr = document.getElementById('input-jcptoken').value.trim();

        if (!ethers.utils.isAddress(wAddr) || !ethers.utils.isAddress(jAddr)) {
            debugLog("地址格式不正确，请重新检查", true);
            return;
        }

        if (window.ethereum) {
            try {
                debugLog("正在申请 MetaMask 连接权限...");
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();

                const workLogABI = ["function submitTask() public", "function totalWork() public view returns (uint256)"];
                const jcpTokenABI = ["function claimSubsidy() public", "function totalSupply() public view returns (uint256)"];

                workLogContract = new ethers.Contract(wAddr, workLogABI, signer);
                jcpTokenContract = new ethers.Contract(jAddr, jcpTokenABI, signer);

                // 验证读取数据
                const gcp = await workLogContract.totalWork();
                debugLog("链路打通！当前 GCP: " + gcp);

                document.getElementById('btn-work').disabled = false;
                document.getElementById('btn-claim').disabled = false;
                document.getElementById('user-status').innerText = "✅ 已连接至区块链实验室";
                
                // 启动轮询更新
                setInterval(updateData, 5000);
            } catch (err) {
                debugLog("连接失败: " + err.message, true);
            }
        } else {
            debugLog("未检测到钱包插件", true);
        }
    }

    async function updateData() {
        try {
            const gcp = await workLogContract.totalWork();
            const supply = await jcpTokenContract.totalSupply();
            document.getElementById('val-gcp').innerText = gcp.toString();
            document.getElementById('val-supply').innerText = Math.round(ethers.utils.formatEther(supply));
        } catch (e) { console.error(e); }
    }

    async function doWork() {
        try {
            debugLog("正在提交生产任务，请在钱包确认...");
            const tx = await workLogContract.submitTask();
            debugLog("交易已发送，等待链上确认...");
            await tx.wait();
            debugLog("生产任务确认成功！");
        } catch (e) { debugLog("操作取消: " + e.message, true); }
    }

    async function claim() {
        try {
            debugLog("正在领取补贴...");
            const tx = await jcpTokenContract.claimSubsidy();
            await tx.wait();
            debugLog("JCP 领取成功！");
        } catch (e) { debugLog("领取失败: " + e.message, true); }
    }
</script>
</body>
</html>
