<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>L3 跨层通信交互课件 - 暨南大学金融科技</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --l3-color: #3b82f6; --l2-color: #8b5cf6; --l1-color: #f59e0b; --danger: #ef4444; }
        body { background: var(--bg); color: #1e293b; font-family: system-ui, sans-serif; height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { text-align: center; margin-bottom: 15px; }
        .main-container { display: flex; flex: 1; gap: 20px; overflow: hidden; }

        /* 左侧：L3 实验区 */
        #l3-panel { width: 320px; background: white; border-radius: 12px; border: 2px solid var(--l3-color); padding: 15px; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        input { width: 90px; border: 2px solid #e2e8f0; border-radius: 4px; padding: 4px; font-weight: bold; outline: none; }
        input:focus { border-color: var(--l3-color); }

        /* 中间：可视化树 */
        #viz-panel { flex: 1; background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; position: relative; display: flex; flex-direction: column; }
        #tree-wrapper { flex: 1; display: flex; flex-direction: column-reverse; align-items: center; justify-content: space-around; padding: 20px 0; border-bottom: 2px dashed #e2e8f0; }
        .tree-layer { display: flex; justify-content: center; width: 100%; gap: 6px; z-index: 5; }
        .node { width: 45px; height: 25px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 3px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-family: monospace; transition: all 0.3s; }
        .node.root { width: 120px; height: 40px; border: 2px solid var(--l3-color); font-size: 12px; font-weight: bold; background: #eff6ff; }
        .node.changed { background: #fee2e2 !important; border-color: var(--danger) !important; color: var(--danger) !important; transform: scale(1.1); }

        /* 右侧：L2 & L1 锚定区 */
        #anchor-panel { width: 280px; display: flex; flex-direction: column; gap: 20px; }
        .anchor-box { background: white; border-radius: 12px; padding: 15px; flex: 1; border-width: 2px; border-style: solid; position: relative; transition: all 0.5s; }
        .l2-box { border-color: var(--l2-color); }
        .l1-box { border-color: var(--l1-color); }
        .anchor-title { font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }
        .hash-display { font-family: monospace; word-break: break-all; font-size: 11px; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px inset #eee; }
        
        /* 按钮动画 */
        .sync-btn { background: var(--l3-color); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .sync-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .sync-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        #svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .sync-pulse { animation: pulse 1s cubic-bezier(0, 0, 0.2, 1); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 24px;">Layer 3 → Layer 1 跨层通信状态同步演示</h1>
    <p style="color: #64748b; margin: 5px 0;">观察 L3 的数据变动如何通过哈希指纹“递归锚定”到以太坊主网</p>
</div>

<div class="main-container">
    <div id="l3-panel">
        <h3 style="color: var(--l3-color); margin-top:0;">📡 L3 应用链节点 (App-Chain)</h3>
        <div id="input-list"></div>
        <button class="sync-btn" id="l3-to-l2-btn" onclick="syncToL2()">⬆️ 向 L2 提交状态 (Commit)</button>
    </div>

    <div id="viz-panel">
        <span style="font-size:12px; color:#94a3b8; text-align:center;">L3 内部 Merkle Tree 结构</span>
        <div id="tree-wrapper">
            <svg id="svg-canvas"></svg>
        </div>
    </div>

    <div id="anchor-panel">
        <div class="anchor-box l2-box" id="l2-contract">
            <span class="anchor-title" style="color: var(--l2-color);">🟣 L2 智能合约 (Settlement)</span>
            <div style="font-size:11px; margin-bottom:5px;">存储的 L3 StateRoot:</div>
            <div class="hash-display" id="l2-storage">等待同步...</div>
            <button class="sync-btn" style="background: var(--l2-color); font-size:12px; width:100%" onclick="syncToL1()">🏛️ 批量同步至 L1 (Rollup)</button>
        </div>

        <div class="anchor-box l1-box" id="l1-mainnet">
            <span class="anchor-title" style="color: var(--l1-color);">🟠 L1 以太坊主网 (Finality)</span>
            <div style="font-size:11px; margin-bottom:5px;">最终确定的指纹:</div>
            <div class="hash-display" id="l1-storage" style="color: var(--accent-gold); font-weight:bold;">0x7a2d... (Genesis)</div>
            <div style="font-size:10px; margin-top:10px; color:#94a3b8; line-height:1.4;">
                ※ 只要 L1 记录的哈希不变，任何人无法在 L3 伪造历史余额。
            </div>
        </div>
    </div>
</div>

<script>
    let users = Array.from({length: 16}, (_, i) => ({ id: String.fromCharCode(65 + i), balance: 100 }));
    let currentL3Root = "";
    let baseHashes = [];

    function getHash(t) { return CryptoJS.SHA256(t).toString().substring(0, 8); }

    function renderInputs() {
        const list = document.getElementById('input-list');
        list.innerHTML = users.map((u, i) => `
            <div class="input-group">
                <label>User ${u.id}</label>
                <input type="number" value="${u.balance}" oninput="updateL3(${i}, this.value)">
            </div>`).join('');
    }

    function updateL3(i, val) {
        users[i].balance = val;
        renderTree();
    }

    function renderTree() {
        let layers = [];
        let current = users.map(u => getHash(u.id + u.balance));
        layers.push(current);
        for (let i = 0; i < 4; i++) {
            let next = [];
            for (let j = 0; j < current.length; j += 2) {
                next.push(getHash(current[j] + current[j+1]));
            }
            current = next;
            layers.push(current);
        }
        currentL3Root = layers[4][0];
        if(baseHashes.length === 0) baseHashes = layers.map(l => [...l]);

        const wrapper = document.getElementById('tree-wrapper');
        const oldLayers = wrapper.querySelectorAll('.tree-layer');
        oldLayers.forEach(l => l.remove());

        layers.forEach((layer, lIdx) => {
            const div = document.createElement('div');
            div.className = "tree-layer";
            div.innerHTML = layer.map((h, nIdx) => {
                const changed = h !== baseHashes[lIdx][nIdx];
                return `<div class="node ${lIdx===4?'root':''} ${changed?'changed':''}" id="n-${lIdx}-${nIdx}">${h}</div>`;
            }).join('');
            wrapper.appendChild(div);
        });
        setTimeout(drawLines, 50);
    }

    function drawLines() {
        const svg = document.getElementById('svg-canvas');
        svg.innerHTML = '';
        const rect = document.getElementById('tree-wrapper').getBoundingClientRect();
        for (let l = 0; l < 4; l++) {
            for (let n = 0; n < Math.pow(2, 4-l); n++) {
                const c = document.getElementById(`n-${l}-${n}`);
                const p = document.getElementById(`n-${l+1}-${Math.floor(n/2)}`);
                const cR = c.getBoundingClientRect(); const pR = p.getBoundingClientRect();
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", cR.left + cR.width/2 - rect.left);
                line.setAttribute("y1", cR.top - rect.top);
                line.setAttribute("x2", pR.left + pR.width/2 - rect.left);
                line.setAttribute("y2", pR.bottom - rect.top);
                const isRed = c.classList.contains('changed') && p.classList.contains('changed');
                line.setAttribute("stroke", isRed ? "#ef4444" : "#e2e8f0");
                line.setAttribute("stroke-width", isRed ? "3" : "1");
                svg.appendChild(line);
            }
        }
    }

    function syncToL2() {
        const l2Box = document.getElementById('l2-contract');
        const l2Storage = document.getElementById('l2-storage');
        l2Box.classList.add('sync-pulse');
        l2Storage.innerText = "0x" + currentL3Root;
        l2Storage.style.color = "var(--l2-color)";
        setTimeout(() => l2Box.classList.remove('sync-pulse'), 1000);
    }

    function syncToL1() {
        const l1Box = document.getElementById('l1-mainnet');
        const l1Storage = document.getElementById('l1-storage');
        const l2Data = document.getElementById('l2-storage').innerText;
        if(l2Data.includes("等待")) return alert("请先完成 L3 到 L2 的提交！");
        
        l1Box.classList.add('sync-pulse');
        // 模拟 L2 Root 的计算，这里简化为对 L3 Root 的二次哈希
        l1Storage.innerText = "0x" + getHash(l2Data + "L2_BATCH_PROOF");
        setTimeout(() => l1Box.classList.remove('sync-pulse'), 1000);
    }

    window.onresize = drawLines;
    renderInputs();
    renderTree();
</script>

</body>
</html>
